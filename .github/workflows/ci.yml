name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test (macOS 15)
    runs-on: macos-15

    steps:
    - name: Checkout EliteAgent
      uses: actions/checkout@v4
      with:
        path: EliteAgent

    - name: Select Xcode 16.x
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || true

    - name: Swift Cache
      uses: actions/cache@v4
      with:
        path: EliteAgent/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('EliteAgent/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Build EliteAgent
      working-directory: ./EliteAgent
      run: swift build -v

    - name: Run Tests
      working-directory: ./EliteAgent
      run: swift test -v
